name: Build solution
permissions:
  contents: read
on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Create a release'
        type: boolean
        required: false
        default: false
  push:
    branches:
    - dev
    - 'releases/**'
    tags:
      - "v*"
  pull_request:
    branches: [ "dev", "master", "releases/**" ]

jobs:
  call-build:
    uses: Yvand/EntraCP/.github/workflows/reusable-build.yml@dev
    with:
      project_name: ${{ vars.PROJECT_NAME }}
      publish_release: false
    secrets:
      base64_encoded_signingkey: ${{ secrets.BASE64_ENCODED_SIGNINGKEY }}
