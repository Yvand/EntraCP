name: Build solution
permissions:
  contents: read
on:
  workflow_dispatch:
  push:
    branches:
    - dev
    - 'releases/**'
  pull_request:
    branches: [ "dev", "master", "releases/**" ]

jobs:
  call-build:
    uses: Yvand/EntraCP/.github/workflows/reusable-build.yml@dev
    with:
      project_name: ${{ vars.PROJECT_NAME }}
      release_version: ${{ vars.RELEASE_VERSION }}
      is_production_release: false
    secrets:
      base64_encoded_signingkey: ${{ secrets.BASE64_ENCODED_SIGNINGKEY }}
